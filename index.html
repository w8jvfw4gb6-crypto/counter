<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лічильник часу</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:
        radial-gradient(circle at top,#1f3a68 0%,#0b1528 45%,#050912 100%);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:700px;
    height:700px;
    border-radius:50%;
    background:rgba(86,156,255,.18);
    filter:blur(120px);
    top:-250px;
    left:-200px;
}

.container{
    text-align:center;
    z-index:1;
}

h1{
    font-size:46px;
    margin-bottom:45px;
    font-weight:700;
    text-shadow:0 4px 20px rgba(0,0,0,.4);
}

.counter{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.box{
    width:150px;
    height:150px;
    border-radius:28px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    transition:.3s;
}

.box:hover{
    transform:translateY(-8px) scale(1.04);
    background:rgba(255,255,255,.12);
}

.number{
    font-size:58px;
    font-weight:700;
}

.label{
    margin-top:12px;
    font-size:15px;
    opacity:.75;
    text-transform:uppercase;
    letter-spacing:3px;
}

@media(max-width:700px){

h1{
    font-size:30px;
}

.box{
    width:110px;
    height:110px;
}

.number{
    font-size:42px;
}

.label{
    font-size:13px;
}

.counter{
    gap:12px;
}

}
</style>

</head>

<body>

<div class="container">

<h1>Минуло з 29.06.2024</h1>

<div class="counter">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">Днів</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">Годин</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">Хвилин</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">Секунд</div>
</div>

</div>

</div>

<script>

const startDate = new Date("2024-06-29T00:00:00");

function updateCounter(){

const now = new Date();

const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));

const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const minutes = Math.floor((diff%(1000*60*60))/(1000*60));

const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").textContent=days;
document.getElementById("hours").textContent=hours;
document.getElementById("minutes").textContent=minutes;
document.getElementById("seconds").textContent=seconds;

}

updateCounter();

setInterval(updateCounter,1000);

</script>

</body>
</html>
