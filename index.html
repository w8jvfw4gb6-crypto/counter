<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лічильник часу</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #111827, #1f2937);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    font-size: 42px;
    margin-bottom: 40px;
    font-weight: 700;
}

.counter {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.box {
    width: 140px;
    height: 140px;
    border-radius: 24px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 15px 30px rgba(0,0,0,.3);
    transition: .3s;
}

.box:hover {
    transform: translateY(-8px);
}

.number {
    font-size: 52px;
    font-weight: bold;
}

.label {
    margin-top: 10px;
    font-size: 16px;
    opacity: .8;
    text-transform: uppercase;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="container">

<h1>Минуло з 29.06.2024</h1>

<div class="counter">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">Днів</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">Годин</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">Хвилин</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">Секунд</div>
</div>

</div>

</div>
</body>
</html>
